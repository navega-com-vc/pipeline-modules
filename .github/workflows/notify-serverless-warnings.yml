name: Notify Serverless Warnings

on:
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy logs artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Detect warnings
        id: detect
        run: |
          set -euo pipefail

          # Junta todos os logs em um arquivo
          find artifacts -type f -name "deploy.log" -print0 | xargs -0 cat > all.log || true
          if [ ! -s all.log ]; then
            # fallback: concatena tudo que tiver dentro dos artifacts
            find artifacts -type f -print0 | xargs -0 cat > all.log || true
          fi

          PATTERN_RESOURCES='DeprecationWarning'
          FOUND=false
          COUNT=""

          if grep -E "$PATTERN_RESOURCES" all.log >/dev/null; then
            FOUND=true
            COUNT=$(grep -Eo "You have [0-9]+ resources" all.log | head -n 1 | grep -Eo "[0-9]+")
          fi

          echo "found=$FOUND" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Notify Teams
        if: steps.detect.outputs.found == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          COUNT: ${{ steps.detect.outputs.count }}
        run: |
          set -euo pipefail

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MSG="⚠️ Serverless CloudFormation Warning\n\nRepo: ${GITHUB_REPOSITORY}\nResources: ${COUNT}\nRun: ${RUN_URL}"

          # Escape simples p/ JSON
          MSG="${MSG//\\/\\\\}"
          MSG="${MSG//\"/\\\"}"
          MSG="${MSG//$'\n'/\\n}"

          curl -sS -H "Content-Type: application/json" \
            -d "{\"text\":\"${MSG}\"}" \
            "$TEAMS_WEBHOOK_URL"
